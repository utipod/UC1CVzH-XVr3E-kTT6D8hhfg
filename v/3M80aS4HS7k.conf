description = "My Calisthenics Programs: \n👉 https://fitnessfaqs.com \n\nFollow Me: \nhttps://www.instagram.com/FitnessFAQs\nhttps://www.facebook.com/FitnessFAQs\n\nMUSIC:\nTitle: Slips & Slurs - Divided VIP\nVideo Link: https://www.youtube.com/watch?v=VPxUQiH--kU\n\nIn this video I will show you how to train your abs dynamically as well as statically on a pull up bar. The exercises will be done whilst hanging and I am going to demonstrate a beginner and advanced workout. The exercises include variations of hanging knee raises and hanging leg raises. \n\nIf you are one of the 1% of people who actually read the description box know that training your abs if you are a fat expecting to develop a six pack is an absolute joke and waste of time. Get a low body fat % and hit them hard 1-2x a week with dedicated ab work. The rest of the magic comes from progressive overload on compound movements. All the best."
